# Configuration for cargo-deny v0.19+
[advisories]
db-path = "~/.cargo/advisory-db"
# 2026-04-30: dropped RUSTSEC-2026-0097 (rand 0.8.5 reseed unsoundness).
# cargo-deny emitted advisory-not-detected — the advisory no longer matches
# any crate in the resolved graph, so the ignore was producing a CI warning.
#
# 2026-06-19: rustls-webpki 0.101.7, pulled transitively via the AWS SDK's
# default TLS connector (aws-config -> aws-smithy-http-client 1.1.13 ->
# hyper-rustls 0.24 -> rustls 0.21 -> rustls-webpki 0.101). These are the LATEST
# AWS SDK releases and they still ship rustls 0.21; there is no upstream fix to
# upgrade to. A newer rustls-webpki (0.103) is already in the graph via our other
# TLS users (reqwest), so only the AWS legacy path is affected. The three
# advisories are not reachable for our use (S3/STS/SSO over TLS to AWS public
# endpoints): 0098/0099 concern name-constraint validation, which AWS public leaf
# certs do not exercise, and 0104 is a panic in CRL parsing, and the SDK's TLS
# path uses no CRLs. Revisit when aws-smithy-http-client's default connector
# moves to rustls 0.23 (then drop these).
# 2026-06-20: advisories introduced by the connector-coverage waves.
# - RUSTSEC-2023-0071 (rsa "Marvin" key-recovery timing sidechannel): rsa is
#   pulled ONLY by sqlx-mysql, where the client performs RSA *encryption* of its
#   password with the MySQL server's public key (caching_sha2/sha256 auth). The
#   Marvin attack targets *private-key decryption* timing, which the client never
#   performs — the private key lives on the MySQL server. Not reachable for a
#   FerroStash (client) deployment. Revisit when rsa ships a fixed release.
# - RUSTSEC-2025-0134 (rustls-pemfile unmaintained): transitive via
#   lapin -> amq-protocol-tcp -> rustls-connector -> rustls-native-certs. Stable,
#   unmaintained-only (no vuln). Revisit when lapin's TLS stack updates.
# - RUSTSEC-2024-0384 (instant unmaintained): transitive, unmaintained-only.
ignore = [
    "RUSTSEC-2026-0098", # rustls-webpki name constraints (URI) — AWS legacy TLS only
    "RUSTSEC-2026-0099", # rustls-webpki name constraints (wildcard) — AWS legacy TLS only
    "RUSTSEC-2026-0104", # rustls-webpki CRL parse panic — unreachable (no CRLs)
    "RUSTSEC-2023-0071", # rsa Marvin — sqlx-mysql client-side encryption only, not reachable
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained — transitive via lapin
    "RUSTSEC-2024-0384", # instant unmaintained — transitive, unmaintained-only
]
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC",
    "Unlicense", "Zlib", "0BSD", "Unicode-3.0", "BSL-1.0",
    "CC0-1.0", "MIT-0", "MPL-2.0", "Apache-2.0 WITH LLVM-exception", "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
    "BlueOak-1.0.0", # Blue Oak Model License 1.0.0 (permissive) — via minicbor (aws-smithy-cbor / cloudwatch)
]
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
