# Configuration for cargo-deny v0.19+
[advisories]
db-path = "~/.cargo/advisory-db"
# 2026-04-30: dropped RUSTSEC-2026-0097 (rand 0.8.5 reseed unsoundness).
# cargo-deny emitted advisory-not-detected — the advisory no longer matches
# any crate in the resolved graph, so the ignore was producing a CI warning.
ignore = []
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC",
    "Unlicense", "Zlib", "0BSD", "Unicode-3.0", "BSL-1.0",
    "CC0-1.0", "MIT-0", "MPL-2.0", "Apache-2.0 WITH LLVM-exception", "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
]
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
