# Logstash benchmark config — tuned for maximum throughput
# pipeline.workers: 12 (= CPU cores)
# pipeline.batch.size: 500
# pipeline.batch.delay: 5

input {
  file {
    path => "C:/msys64/tmp/bench_input.log"
    start_position => "beginning"
    sincedb_path => "NUL"
    mode => "read"
    exit_after_read => true
    file_completed_action => "log"
    file_completed_log_path => "NUL"
  }
}

filter {
  grok {
    match => { "message" => "%{IP:client_ip} %{WORD:method} %{URIPATH:path} %{INT:status:int} %{INT:bytes:int} %{QS:agent} %{NUMBER:latency:float}" }
  }
  mutate {
    lowercase => ["method"]
    add_field => { "pipeline" => "logstash" }
  }
}

output {
  null { }
}
