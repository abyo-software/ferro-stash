# Logstash benchmark — generator input, grok+mutate, null output
# Tuning: workers=12, batch_size=500, batch_delay=5

input {
  generator {
    lines => ["192.168.1.100 GET /api/v1/users 200 1234 \"Mozilla/5.0\" 0.003"]
    count => 1000000
    threads => 1
  }
}

filter {
  grok {
    match => { "message" => "%{IP:client_ip} %{WORD:method} %{URIPATHPARAM:path} %{INT:status:int} %{INT:bytes:int} %{QS:agent} %{NUMBER:latency:float}" }
  }
  mutate {
    lowercase => ["method"]
    add_field => { "pipeline" => "logstash" }
  }
}

output {
  null { }
}
