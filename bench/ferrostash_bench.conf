# FerroStash benchmark config — same workload as Logstash
input {
  file {
    path => "C:/msys64/tmp/bench_input.log"
    start_position => "beginning"
    sincedb_path => "NUL"
  }
}

filter {
  grok {
    match => { "message" => "%{IP:client_ip} %{NOTSPACE:method} %{URIPATH:path} %{INT:status:int} %{INT:bytes:int} %{QS:agent} %{NUMBER:latency:float}" }
  }
  mutate {
    lowercase => ["method"]
    add_field => { "pipeline" => "ferro-stash" }
  }
}

output {
  null { }
}
