input { stdin { } }
filter {
  ruby {
    code => "
      msg = event.get('message')
      if msg.include?('GET')
        event.set('method', 'GET')
        event.set('is_read', true)
      else
        event.set('is_read', false)
      end
      event.set('msg_length', msg.length)
      event.set('processed', true)
    "
  }
}
output { null { } }
