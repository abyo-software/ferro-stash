# SPDX-License-Identifier: Apache-2.0
# Default values for the ferro-stash-helm (AWS Marketplace) chart.

image:
  # MUST point at the Marketplace ECR repo that deploy/marketplace-container.sh
  # provisions via AddRepositories. AWS scans the chart and fails it
  # (INVALID_HELM_CHART_IMAGES) if the image is not from this repository.
  repository: 709825985650.dkr.ecr.us-east-1.amazonaws.com/abyo-software/ferro-stash-container
  # Defaults to the chart appVersion when empty. ECR tags are immutable.
  tag: ""
  pullPolicy: IfNotPresent

# AWS Marketplace metered-container entitlement settings. The image is built
# `--features marketplace` and calls RegisterUsage once at startup.
marketplace:
  # The Marketplace product code for this product (from `describe-entity ...
  # ProductCode`). Baked in so the Marketplace-distributed chart works out of the
  # box; override only for testing. When empty the in-container entitlement check
  # is skipped (so the chart still installs in a dev cluster without a code).
  productCode: "5yfse46z2atv2xoba1qm3666x"
  # AWS region for the RegisterUsage call. MUST be non-empty so a fail-closed
  # template never renders an empty region; us-east-1 is the Marketplace home.
  awsRegion: us-east-1

# Keep generated resource / label names as "ferro-stash" even though the chart
# name is "ferro-stash-helm" (the name is dictated by the helm push path).
nameOverride: "ferro-stash"

imagePullSecrets: []
fullnameOverride: ""

replicaCount: 1

# Pod-level scheduling.
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

# Extra CLI args appended to the container command (e.g. ["--log.level","debug"]).
extraArgs: []

# Container resources. Tune to your pipeline throughput.
resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Monitoring / metrics API. The chart binds all pod interfaces so Kubernetes
# health probes can reach it; keep the Service private and use port-forward.
api:
  bind: 0.0.0.0

service:
  type: ClusterIP
  port: 9600
  annotations: {}

# Liveness/readiness use the /_health_report endpoint exposed by the API.
probes:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10

# Security context — runs as the non-root uid baked into the image (65532).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# The pipeline configuration (Logstash .conf DSL). Rendered into a ConfigMap
# and mounted at /etc/ferro-stash/pipeline.conf. Replace with your pipeline.
pipelineConf: |
  input {
    beats {
      port => 5044
    }
  }

  filter {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
    }
    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
    }
  }

  output {
    stdout {
      codec => "json"
    }
  }

# Persistent state directory (path.data: per-instance lock, uuid, queues, DLQ).
persistence:
  enabled: false
  # storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  # Used only when persistence.enabled is false.
  emptyDir: {}

# Optional GeoIP database (.mmdb) for the geoip filter. Provide it via an
# existing Secret (key -> file) mounted read-only into the config dir.
geoip:
  enabled: false
  # Name of a Secret containing the .mmdb file.
  existingSecret: ""
  # Key inside the Secret and the filename it is mounted as.
  secretKey: GeoLite2-City.mmdb
  mountPath: /etc/ferro-stash/GeoLite2-City.mmdb

# Extra environment variables for the container.
env: []
#  - name: RUST_LOG
#    value: info

serviceAccount:
  create: true
  name: ""
  annotations: {}
