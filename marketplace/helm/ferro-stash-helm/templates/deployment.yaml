apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ferro-stash.fullname" . }}
  labels:
    {{- include "ferro-stash.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ferro-stash.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the pipeline config changes.
        checksum/config: {{ .Values.pipelineConf | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ferro-stash.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ferro-stash.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ferro-stash
          image: {{ include "ferro-stash.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - -f
            - /etc/ferro-stash/pipeline.conf
            - --path.data
            - /var/lib/ferro-stash
            - --api.http.host
            - {{ .Values.api.bind }}:{{ .Values.service.port }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /_health_report
              port: api
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /_health_report
              port: api
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
          {{- end }}
          env:
            # AWS Marketplace entitlement gate. The product code may be empty in
            # a dev cluster (the in-container check then skips itself); the region
            # is `required` non-empty so the gate never runs against an empty
            # region (fail-closed defence; values.yaml defaults it to us-east-1).
            - name: FERROSTASH_MARKETPLACE_PRODUCT_CODE
              value: {{ .Values.marketplace.productCode | quote }}
            - name: AWS_REGION
              value: {{ .Values.marketplace.awsRegion | required "marketplace.awsRegion must be set (non-empty)" | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/ferro-stash/pipeline.conf
              subPath: pipeline.conf
              readOnly: true
            - name: data
              mountPath: /var/lib/ferro-stash
            {{- if .Values.geoip.enabled }}
            - name: geoip
              mountPath: {{ .Values.geoip.mountPath }}
              subPath: {{ .Values.geoip.secretKey }}
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ferro-stash.fullname" . }}-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ferro-stash.fullname" . }}-data
          {{- else }}
          emptyDir:
            {{- toYaml .Values.persistence.emptyDir | nindent 12 }}
          {{- end }}
        {{- if .Values.geoip.enabled }}
        - name: geoip
          secret:
            secretName: {{ .Values.geoip.existingSecret | required "geoip.existingSecret is required when geoip.enabled is true" }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ferro-stash.fullname" . }}-data
  labels:
    {{- include "ferro-stash.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
