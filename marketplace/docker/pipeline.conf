#
# FerroStash -- default container pipeline (Logstash DSL).
#
# This is a SAFE, self-contained default so the container starts cleanly with no
# external dependency: it accepts Elastic Beats input on TCP 5044 and writes the
# events to a local file under the data dir (an emptyDir / mounted volume).
#
# Replace it for your real pipeline. In Kubernetes the FerroStash Helm chart
# renders this from `.Values.pipelineConf` into a ConfigMap mounted at
# /etc/ferro-stash/pipeline.conf -- edit that value and `helm upgrade`. Common
# changes:
#
#   * Send to Elasticsearch / OpenSearch:
#       output { elasticsearch { hosts => ["https://my-es:9200"] index => "logs-%{+YYYY.MM.dd}" } }
#   * Send to Kafka:
#       output { kafka { bootstrap_servers => "broker:9092" topic_id => "logs" } }
#   * Send to S3:
#       output { s3 { bucket => "my-bucket" region => "us-east-1" prefix => "logs/" } }
#
# A config that references a plugin FerroStash does not implement fails fast at
# load with a clear error -- see the bundled Logstash compatibility matrix.

input {
  beats {
    port => 5044
  }
}

filter {
  # Add your parsing/enrichment here, e.g.:
  #   grok { match => { "message" => "%{COMBINEDAPACHELOG}" } }
  #   date { match => ["timestamp", "ISO8601"] }
}

output {
  file {
    path => "/var/lib/ferro-stash/output/events-%{+YYYY.MM.dd}.jsonl"
    codec => "json_lines"
  }
}
