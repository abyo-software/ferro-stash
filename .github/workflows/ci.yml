# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # sccache: cache rustc codegen across jobs/runs/runner-instances so a cold
  # target (e.g. after the runner's disk-pressure cleanup) or a parallel job on
  # a different self-hosted instance reuses compiled artifacts instead of
  # rebuilding from scratch. `CARGO_INCREMENTAL: 0` is REQUIRED — sccache refuses
  # to cache incrementally-compiled crates, so without it the cache stays empty.
  # The cache dir is shared+bounded; the runner's ci-disk-guard prunes under
  # pressure, and SCCACHE_CACHE_SIZE caps it independently.
  RUSTC_WRAPPER: sccache
  SCCACHE_DIR: /home/runner/sccache-cache
  SCCACHE_CACHE_SIZE: 12G
  CARGO_INCREMENTAL: 0
  # Note: `RUSTFLAGS: -Dwarnings` intentionally NOT set here. It would
  # propagate to the external Artichoke git dependency (pulled by the `ruby`
  # job) which we don't control. Workspace-level strictness is enforced via
  # `[workspace.lints]` in Cargo.toml (workspace-only), and clippy CI
  # passes `-D warnings` explicitly.
  # implemented`). Prepend the pre-installed toolchain bin directory instead
  # of invoking dtolnay/rust-toolchain (which calls rustup internally).

# Wave 14 capacity reduction (replicates ferro-protocols c0f945d):
#   * `cargo check` job dropped — `cargo clippy` is a strict superset.
#   * Coverage moved to push-to-main only (see coverage.yml).
#   * cargo-audit / cargo-deny / cargo-llvm-cov already use
#     taiki-e/install-action@v2; nothing else to convert.
#   * No cross-OS matrix in this repo (Linux KVM is canonical).

jobs:
  test:
    name: Test
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # Default members exclude ferro-stash-ruby (Artichoke mruby), so this run
      # is artichoke-free and fast. The `ruby` job covers that path.
      - run: cargo test

  ruby:
    name: Ruby filter (feature)
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # Exercises the optional `ruby` filter, pulling Artichoke from the pinned
      # git dependency (abyo-software/artichoke-extended) — no sibling checkout.
      - run: cargo clippy -p ferro-stash-ruby
      - run: cargo clippy -p ferro-stash-filter --features ruby --all-targets
      - run: cargo test -p ferro-stash-ruby
      - run: cargo test -p ferro-stash-filter --features ruby

  clippy:
    name: Clippy
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets

  fmt:
    name: Format
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      # Artichoke is now a git dependency (not a sibling path dep), so
      # `cargo fmt --all` formats only our workspace members and never descends
      # into the fork.
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - run: cargo generate-lockfile
      # cargo install cargo-audit pulls aws-lc-sys, which fails to build on
      # macOS aarch64 self-hosted runner (ios-aarch64 generated asm path lookup).
      # Install pre-built binary instead.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        # Ignores kept in sync with deny.toml [advisories].ignore (see that file
        # for the full justification). RUSTSEC-2026-0098/0099/0104 are
        # rustls-webpki 0.101 advisories pulled only via the AWS SDK's legacy TLS
        # connector (latest aws-smithy-http-client still ships rustls 0.21; no
        # upstream fix) and are not reachable for S3/STS/SSO endpoint TLS. Revisit
        # when the AWS SDK's default connector moves to rustls 0.23.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2024-0384

  deny:
    name: Cargo Deny
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      # cargo install cargo-deny pulls aws-lc-sys, which fails to build on
      # macOS aarch64 self-hosted runner (ios-aarch64 generated asm path lookup).
      # Install pre-built binary instead.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Run cargo deny
        run: cargo deny check

