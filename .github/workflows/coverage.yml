# SPDX-License-Identifier: Apache-2.0
name: Coverage

# Coverage instrumentation makes the build 2-5x slower than a plain test
# run and uploads to Codecov on success. There's no value in producing a
# fresh coverage report for every PR commit — Codecov reports historical
# coverage on the merged main branch, not on uncommitted PRs. Running on
# push-to-main + manual dispatch frees the KVM runner pool for
# PR-blocking jobs.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # --workspace includes ferro-stash-ruby (a member), which pulls Artichoke
      # from its git dependency — no sibling checkout needed.
      - run: cargo llvm-cov --workspace --cobertura --output-path cobertura.xml
      - name: Upload coverage artefact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cobertura.xml
