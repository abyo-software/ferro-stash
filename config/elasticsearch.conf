# FerroStash → Elasticsearch / FerroSearch pipeline

input {
  file {
    path => "/var/log/nginx/access.log"
    start_position => "beginning"
    tags => ["nginx", "web"]
  }

  tcp {
    port => 5044
    tags => ["beats"]
  }

  http {
    port => 8080
    tags => ["http_input"]
  }
}

filter {
  grok {
    match => { "message" => "%{COMBINEDAPACHELOG}" }
    tag_on_failure => ["_grokparsefailure"]
  }

  date {
    match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
    target => "@timestamp"
  }

  mutate {
    convert => { "response" => "integer", "bytes" => "integer" }
    remove_field => ["message"]
    add_field => { "pipeline" => "ferro-stash" }
  }

  geoip {
    source => "clientip"
  }

  if [response] >= 400 {
    mutate {
      add_tag => ["error"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "logs-%{+%Y.%m.%d}"
    user => "elastic"
    password => "changeme"
  }

  if "error" in [tags] {
    stdout {
      codec => "json"
    }
  }
}
