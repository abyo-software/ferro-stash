# FerroStash Example Configuration (Logstash DSL format)
# This demonstrates the most common pipeline setup.

input {
  stdin { }
}

filter {
  grok {
    match => { "message" => "%{IP:client_ip} %{NOTSPACE:method} %{URIPATH:path} %{INT:status:int}" }
  }
  date {
    match => ["timestamp", "ISO8601"]
  }
  mutate {
    lowercase => ["method"]
    remove_field => ["message"]
  }
}

output {
  stdout {
    codec => "rubydebug"
  }
}
