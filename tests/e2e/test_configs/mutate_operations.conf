# Mutate operations — test rename, uppercase, lowercase, add_field, add_tag
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  mutate {
    rename => { "user" => "username" }
    uppercase => ["service"]
    lowercase => ["level"]
    add_field => { "pipeline" => "ferro-stash" }
    add_tag => ["processed", "mutated"]
    remove_field => ["message"]
  }
}

output {
  stdout { }
}
