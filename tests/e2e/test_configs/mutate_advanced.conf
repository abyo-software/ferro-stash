# Advanced mutate — gsub, split, convert, copy, strip
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  mutate {
    gsub => ["action", "_", "-"]
    convert => { "duration_ms" => "string" }
    copy => { "service" => "service_backup" }
    strip => ["ip"]
    add_field => { "env" => "production" }
    remove_field => ["message"]
  }
}

output {
  stdout { }
}
