# Multi-filter chain — grok, then mutate, then add_field
input {
  stdin { }
}

filter {
  grok {
    match => { "message" => "%{IP:clientip} %{NOTSPACE} %{NOTSPACE:ident} \[%{GREEDYDATA:raw_timestamp}\] \"%{WORD:verb} %{NOTSPACE:request}(?: HTTP/%{NUMBER:httpversion})?\" %{INT:response:int} %{NOTSPACE:bytes}" }
  }
  mutate {
    uppercase => ["verb"]
    add_field => { "protocol" => "HTTP" }
    add_tag => ["web_access"]
  }
}

output {
  stdout { }
}
