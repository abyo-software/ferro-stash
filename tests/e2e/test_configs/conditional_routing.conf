# Conditional routing — add tags based on field values
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  if [status] == 200 {
    mutate {
      add_tag => ["success"]
    }
  }
  if [level] == "ERROR" {
    mutate {
      add_tag => ["alert"]
    }
  }
  if [level] == "FATAL" {
    mutate {
      add_tag => ["alert", "critical"]
    }
  }
  if [level] == "CRITICAL" {
    mutate {
      add_tag => ["alert", "critical"]
    }
  }
  mutate {
    remove_field => ["message"]
  }
}

output {
  stdout { }
}
