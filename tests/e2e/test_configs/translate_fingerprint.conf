# Translate and fingerprint — lookup service names and generate hash
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  translate {
    field => "service"
    destination => "service_team"
    dictionary => {
      "auth" => "identity-team"
      "payment" => "billing-team"
      "inventory" => "supply-chain-team"
      "search" => "platform-team"
      "notification" => "messaging-team"
      "api-gateway" => "platform-team"
      "cdn" => "infrastructure-team"
      "database" => "dba-team"
      "storage" => "infrastructure-team"
    }
    fallback => "unassigned"
  }
  fingerprint {
    source => ["service", "action"]
    target => "fingerprint"
    method => "SHA256"
    concatenate_sources => true
  }
  mutate {
    remove_field => ["message"]
  }
}

output {
  stdout { }
}
