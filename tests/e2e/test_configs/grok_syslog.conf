# Grok syslog parsing — extract timestamp, host, program, pid, and message text
input {
  stdin { }
}

filter {
  grok {
    match => { "message" => "%{MONTH:syslog_month} %{MONTHDAY:syslog_day} %{TIME:syslog_time} %{HOSTNAME:syslog_host} %{NOTSPACE:syslog_program}: %{GREEDYDATA:syslog_message}" }
  }
}

output {
  stdout { }
}
