# Dissect — pipe-delimited fields. Faster than grok for fixed-format lines and
# the most-used non-grok structured-extraction filter in Logstash.
input {
  stdin { }
}

filter {
  dissect {
    mapping => { "message" => "%{event_time}|%{level}|%{component}|%{detail}" }
  }
}

output {
  stdout { codec => "json" }
}
