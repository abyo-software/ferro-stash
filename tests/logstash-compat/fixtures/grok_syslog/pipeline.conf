# Grok syslog parsing — extracts month, day, time, host, program, message text
# from a classic RFC3164 syslog line. Mirrors a real-world `filter { grok }` use.
input {
  stdin { }
}

filter {
  grok {
    match => { "message" => "%{MONTH:syslog_month} %{MONTHDAY:syslog_day} %{TIME:syslog_time} %{HOSTNAME:syslog_host} %{NOTSPACE:syslog_program}: %{GREEDYDATA:syslog_message}" }
  }
}

output {
  stdout { codec => "json" }
}
