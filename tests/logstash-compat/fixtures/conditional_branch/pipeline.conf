# Conditional branching — `if`/`else if`/`else` over a parsed JSON field,
# exercising the severity-based field-tagging routing pattern. Wave 5.3
# divergence #3 closed: the parser now accepts `else if`/`else` chains.
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  if [level] == "ERROR" {
    mutate {
      add_field => { "severity" => "high" }
      add_tag => ["alert"]
    }
  } else if [level] == "WARN" {
    mutate {
      add_field => { "severity" => "medium" }
    }
  } else if [level] == "INFO" {
    mutate {
      add_field => { "severity" => "low" }
    }
  } else {
    mutate {
      add_field => { "severity" => "low" }
    }
  }
  mutate {
    remove_field => ["message"]
  }
}

output {
  stdout { codec => "json" }
}
