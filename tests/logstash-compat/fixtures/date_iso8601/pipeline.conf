# Date filter — parse ISO8601 timestamp from a JSON-encoded message and store
# the parsed value in a non-@timestamp target field so the regression harness
# can compare it directly (the harness elides @timestamp).
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  date {
    match => ["ts", "ISO8601"]
    target => "event_time"
  }
  mutate {
    remove_field => ["message"]
  }
}

output {
  stdout { codec => "json" }
}
