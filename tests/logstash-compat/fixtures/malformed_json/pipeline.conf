# Malformed JSON — both engines must add `_jsonparsefailure` to the tags array
# and leave the original `message` intact when parse fails. Mixes valid and
# broken inputs to verify the failure mode is per-event, not pipeline-wide.
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
}

output {
  stdout { codec => "json" }
}
