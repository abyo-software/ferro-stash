# KV — extract space-separated key=value pairs from `message` and merge into
# the event. The expected output shows ferro-stash leaving values as strings
# (matching Logstash KV default).
input {
  stdin { }
}

filter {
  kv {
    source => "message"
    field_split => " "
    value_split => "="
  }
}

output {
  stdout { codec => "json" }
}
