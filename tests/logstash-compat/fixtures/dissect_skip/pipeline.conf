# Dissect with skip-keys — `%{?token}` consumes input but discards the value.
# Used to throw away framing fields without polluting the event.
input {
  stdin { }
}

filter {
  dissect {
    mapping => { "message" => "%{?host} %{client_ip} %{?dash} %{user} [%{?ts}] %{method} %{path} %{status} %{bytes}" }
  }
}

output {
  stdout { codec => "json" }
}
