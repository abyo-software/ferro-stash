# CSV — split a comma-delimited line into named columns. One of the most-used
# structured-extraction filters for flat exports; verifies column naming,
# separator handling, and that surplus/short rows behave like Logstash.
input {
  stdin { }
}

filter {
  csv {
    columns => ["ts", "level", "service", "detail"]
    separator => ","
  }
}

output {
  stdout { codec => "json" }
}
