# Mutate — rename / uppercase / lowercase / add_field / add_tag / remove_field.
# Combines `json` parse for the source message then applies the standard mutate
# transformation set used in real Logstash deployments.
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  mutate {
    rename => { "user" => "username" }
    uppercase => ["service"]
    lowercase => ["level"]
    add_field => { "pipeline" => "ferro-stash" }
    add_tag => ["processed", "mutated"]
    remove_field => ["message"]
  }
}

output {
  stdout { codec => "json" }
}
