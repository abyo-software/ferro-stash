# Split — fan a single event with an array field into one event per element.
# Each output event carries one array element under the same field plus the
# sibling fields. The standard way to explode a batched payload.
input { stdin { } }
filter {
  json { source => "message" }
  split { field => "items" }
  mutate { remove_field => ["message"] }
}
output { stdout { codec => "json" } }
