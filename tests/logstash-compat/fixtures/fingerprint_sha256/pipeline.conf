# Fingerprint — SHA256 hex over the raw message field. Mirrors the most-common
# event-deduplication pattern in production Logstash deployments.
input {
  stdin { }
}

filter {
  fingerprint {
    source => ["message"]
    target => "fp"
    method => "SHA256"
  }
}

output {
  stdout { codec => "json" }
}
