# Unicode-heavy input — Japanese, emoji, and accented Latin all flow through
# `grok` with `GREEDYDATA` and `mutate` add_field. Asserts both engines treat
# UTF-8 byte sequences identically end-to-end.
input {
  stdin { }
}

filter {
  grok {
    match => { "message" => "%{NOTSPACE:user}\|%{GREEDYDATA:body}" }
  }
  mutate {
    add_field => { "decoded" => "%{body}" }
  }
}

output {
  stdout { codec => "json" }
}
