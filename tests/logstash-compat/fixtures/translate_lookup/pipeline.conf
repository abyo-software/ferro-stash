# Translate — dictionary lookup enrichment. Maps a source value to a target
# field via an inline dictionary, with a fallback for misses. The canonical
# code->label / id->name enrichment filter.
input { stdin { } }
filter {
  json { source => "message" }
  translate {
    source => "code"
    target => "status"
    dictionary => {
      "200" => "OK"
      "404" => "NotFound"
      "500" => "ServerError"
    }
    fallback => "Unknown"
  }
}
output { stdout { codec => "json" } }
