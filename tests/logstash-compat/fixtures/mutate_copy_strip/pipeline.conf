# Mutate copy/strip — copy a field to a new name and trim surrounding
# whitespace from another. Exercises mutate sub-ops not in mutate_basic.
input { stdin { } }
filter {
  json { source => "message" }
  mutate {
    copy => { "user" => "user_copy" }
    strip => ["note"]
  }
}
output { stdout { codec => "json" } }
