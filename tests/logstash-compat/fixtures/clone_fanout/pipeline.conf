# Clone — event fan-out. One input event becomes the original plus one clone
# per name in `clones`. Each clone carries a `type` set to the clone name, so
# the test exercises event multiplication and per-clone field divergence — the
# canonical Logstash pattern for routing a copy of each event to a second sink.
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  clone {
    clones => ["audit", "metrics"]
  }
  mutate {
    remove_field => ["message"]
  }
}

output {
  stdout { codec => "json" }
}
