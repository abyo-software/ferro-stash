# Mutate gsub — regex substitution on a field. Used to redact or normalise
# values in place (here: collapse every run of digits to `#`). Exercises the
# regex engine path of mutate, distinct from the rename/case ops in mutate_basic.
input {
  stdin { }
}

filter {
  mutate {
    gsub => ["message", "[0-9]+", "#"]
  }
}

output {
  stdout { codec => "json" }
}
