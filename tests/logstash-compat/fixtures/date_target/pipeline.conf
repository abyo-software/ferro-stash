# Date — parse a timestamp string into a *named* target field (not @timestamp,
# which the runner ignores), so the parsed/normalised value is asserted.
input { stdin { } }
filter {
  json { source => "message" }
  date {
    match => ["ts", "yyyy-MM-dd HH:mm:ss"]
    timezone => "UTC"
    target => "event_time"
  }
}
output { stdout { codec => "json" } }
