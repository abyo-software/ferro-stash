# Drop with conditional — drop DEBUG-level events from a JSON stream. Tests
# both the `drop` filter and the `if [field] == "value"` conditional syntax.
input {
  stdin { }
}

filter {
  json {
    source => "message"
  }
  if [level] == "DEBUG" {
    drop { }
  }
  mutate {
    remove_field => ["message"]
  }
}

output {
  stdout { codec => "json" }
}
