# Mutate convert — type coercion of string fields to integer/float/boolean.
# Exercises the numeric/bool conversion path (distinct from gsub/case ops).
input { stdin { } }
filter {
  json { source => "message" }
  mutate {
    convert => {
      "count" => "integer"
      "ratio" => "float"
      "active" => "boolean"
    }
  }
}
output { stdout { codec => "json" } }
